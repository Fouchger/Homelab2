version: '3'

vars:
  CONFIG: '{{.CONFIG | default "config/sites/local.yaml"}}'
  SECRETS: '{{.SECRETS | default "config/secrets/local.enc.yaml"}}'

tasks:
  default:
    desc: Open the Homelab control panel
    cmds:
      - task: menu

  setup:
    desc: Create the locked production Python environment
    cmds:
      - uv sync --locked --no-dev

  dev:setup:
    desc: Create the locked development environment
    cmds:
      - uv sync --locked --all-groups

  menu:
    desc: Open the interactive terminal control panel
    cmds:
      - uv run --locked --no-dev homelabctl menu --config "{{.CONFIG}}"

  configure:
    desc: Open the configuration editor
    cmds:
      - uv run --locked --no-dev homelabctl menu --page configuration --config "{{.CONFIG}}"

  config:init:
    desc: Create a site configuration using safe defaults
    cmds:
      - uv run --locked --no-dev homelabctl init --config "{{.CONFIG}}"

  config:validate:
    desc: Validate the active site configuration
    cmds:
      - uv run --locked --no-dev homelabctl validate --config "{{.CONFIG}}"

  config:show:
    desc: Show effective non-secret configuration
    cmds:
      - uv run --locked --no-dev homelabctl show --config "{{.CONFIG}}"

  doctor:
    desc: Check control-plane readiness
    cmds:
      - uv run --locked --no-dev homelabctl doctor --config "{{.CONFIG}}" --secrets "{{.SECRETS}}"

  update:plan:
    desc: Preview a guarded control-plane update from GitHub
    cmds:
      - uv run --locked --no-dev homelabctl update --config "{{.CONFIG}}"

  update:
    desc: Apply the previewed fast-forward control-plane update
    cmds:
      - uv run --locked --no-dev homelabctl update --config "{{.CONFIG}}" --apply

  secrets:init:
    desc: Initialize a SOPS-encrypted secret file
    requires:
      vars: [AGE_RECIPIENT]
    cmds:
      - uv run --locked --no-dev homelabctl secrets init --age-recipient "{{.AGE_RECIPIENT}}" --secrets "{{.SECRETS}}"

  secrets:edit:
    desc: Edit runtime credentials through SOPS
    cmds:
      - uv run --locked --no-dev homelabctl secrets edit --secrets "{{.SECRETS}}"

  secrets:check:
    desc: Decrypt and validate runtime credentials without displaying them
    cmds:
      - uv run --locked --no-dev homelabctl secrets check --config "{{.CONFIG}}" --secrets "{{.SECRETS}}"

  proxmox:bootstrap:plan:
    desc: Preview the Proxmox API identity bootstrap
    cmds:
      - uv run --locked --no-dev homelabctl proxmox bootstrap --config "{{.CONFIG}}" --secrets "{{.SECRETS}}"

  proxmox:bootstrap:
    desc: Apply the planned Proxmox API identity bootstrap over administrator SSH
    cmds:
      - uv run --locked --no-dev homelabctl proxmox bootstrap --config "{{.CONFIG}}" --secrets "{{.SECRETS}}" --apply

  tofu:check:
    desc: Validate the OpenTofu foundation and create a non-destructive plan
    cmds:
      - uv run --locked --no-dev homelabctl tofu check --config "{{.CONFIG}}" --secrets "{{.SECRETS}}"

  tofu:apply:
    desc: Apply only the existing reviewed saved plan with runtime credentials
    cmds:
      - uv run --locked --no-dev homelabctl tofu apply --config "{{.CONFIG}}" --secrets "{{.SECRETS}}"

  infrastructure:ssh-key:
    desc: Create and configure the dedicated guest automation SSH key
    cmds:
      - uv run --locked --no-dev homelabctl infrastructure ssh-key --config "{{.CONFIG}}"

  ansible:inventory:
    desc: Derive ignored runtime inventory from accepted OpenTofu outputs
    cmds:
      - uv run --locked --no-dev homelabctl ansible inventory --config "{{.CONFIG}}"

  ansible:check:
    desc: Preview the Debian-family guest baseline without changing guests
    cmds:
      - uv run --locked --no-dev homelabctl ansible check --config "{{.CONFIG}}"

  ansible:apply:
    desc: Apply the reviewed Debian-family guest baseline
    cmds:
      - uv run --locked --no-dev homelabctl ansible apply --config "{{.CONFIG}}"

  ansible:collections:
    desc: Install the locked Ansible collections
    cmds:
      - ansible-galaxy collection install --requirements-file ansible/requirements.yml

  applications:plan:
    desc: Display curated application revisions and checksums
    cmds:
      - uv run --locked --no-dev homelabctl applications plan --config "{{.CONFIG}}"

  applications:check:
    desc: Preview curated application changes without applying them
    cmds:
      - uv run --locked --no-dev homelabctl applications check --config "{{.CONFIG}}"

  applications:apply:
    desc: Apply and health-check the curated application snapshot
    cmds:
      - uv run --locked --no-dev homelabctl applications apply --config "{{.CONFIG}}"

  tofu:ci:
    desc: Check OpenTofu formatting, initialization, validation, and the example plan
    cmds:
      - tofu -chdir=infrastructure fmt -check -recursive
      - tofu -chdir=infrastructure init -backend=false -input=false -lockfile=readonly
      - tofu -chdir=infrastructure validate
      - tofu -chdir=infrastructure plan -refresh=false -lock=false -input=false -var-file=example.tfvars.json -out=example.tfplan

  schema:
    desc: Regenerate the site JSON Schema
    cmds:
      - uv run --locked --no-dev homelabctl schema --output config/schema/site.schema.json

  test:
    desc: Run the automated test suite
    cmds:
      - uv run --locked pytest

  lint:
    desc: Check formatting and code quality
    cmds:
      - uv run --locked ruff format --check .
      - uv run --locked ruff check .

  check:
    desc: Run all repository quality gates
    cmds:
      - task: lint
      - task: test
      - task: config:validate
        vars:
          CONFIG: config/examples/site.yaml
      - task: tofu:ci
