schema_version: 1
site:
  name: homelab
  domain: home.arpa
  timezone: Pacific/Auckland
  environment: production
cloudflare:
  domains:
    - example.com
    - lab.example.net
proxmox:
  api_url: https://pve.home.arpa:8006
  node: pve
  storage: local-lvm
  token_id: homelab@pve!control-plane
  verify_tls: true
network:
  management_cidr: 192.168.10.0/24
  gateway: 192.168.10.1
  dns_servers:
    - 192.168.10.1
  bridge: vmbr0
  vlan_id: null
automation:
  ssh_user: automation
  ssh_private_key: ~/.ssh/homelab_ed25519
  become: true
deployment:
  channel: stable
  check_interval_minutes: 60
  automatic_updates: false
  require_confirmation: true
