schema_version: 1
site:
  name: homelab
  domain: home.arpa
  timezone: Pacific/Auckland
  environment: production
cloudflare:
  domains: []
  records: []
proxmox:
  api_url: https://192.168.20.10:8006/
  node: pve01
  storage: local-lvm
  token_id: homelab@pve!control-plane
  verify_tls: false
  containers:
    - key: monitoring
      vm_id: 201
      hostname: monitoring
      template_file_id: local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst
      address: 192.168.30.201/24
      cores: 2
      memory_mb: 2048
      swap_mb: 512
      disk_gb: 12
      started: true
      start_on_boot: true
      nesting: true
      protection: false
      tags: [monitoring]
    - key: dns-core01
      vm_id: 220
      hostname: dns-core01
      template_file_id: local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst
      address: 192.168.30.53/24
      cores: 1
      memory_mb: 1024
      swap_mb: 512
      disk_gb: 8
      started: true
      start_on_boot: true
      nesting: false
      protection: true
      tags: [dns, network-core]
network:
  management_cidr: 192.168.30.0/24
  gateway: 192.168.30.1
  dns_servers: [192.168.30.2, 192.168.30.3]
  bridge: vmbr0
  vlan_id: 30
automation:
  ssh_user: automation
  ssh_private_key: ~/.ssh/homelab_ed25519
  ssh_public_keys: []
  ssh_public_key_files: [~/.ssh/homelab_ed25519.pub]
  become: true
deployment:
  channel: stable
  check_interval_minutes: 60
  automatic_updates: false
  require_confirmation: true
applications:
  technitium:
    type: technitium
    guest: dns-core01
    enabled: true
    port: 5380
    credential: technitium-admin
