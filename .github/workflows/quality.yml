name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TOFU_VERSION: "1.12.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Synchronize locked environment
        run: uv sync --locked --all-groups

      - name: Install checksum-verified OpenTofu
        run: |
          archive="tofu_${TOFU_VERSION}_linux_amd64.zip"
          curl -fsSLO --proto '=https' --tlsv1.2 --retry 3 "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/${archive}"
          curl -fsSLO --proto '=https' --tlsv1.2 --retry 3 "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_SHA256SUMS"
          grep -F " ${archive}" "tofu_${TOFU_VERSION}_SHA256SUMS" | sha256sum -c -
          unzip -q "$archive" tofu -d "${RUNNER_TEMP}/opentofu"
          sudo install -m 0755 "${RUNNER_TEMP}/opentofu/tofu" /usr/local/bin/tofu

      - name: Check formatting
        run: uv run --locked ruff format --check .

      - name: Run static checks
        run: uv run --locked ruff check .

      - name: Run tests
        run: uv run --locked pytest

      - name: Validate example configuration
        run: |
          uv run --locked homelabctl validate --config config/examples/site.yaml
          uv run --locked homelabctl manifest validate --file config/examples/future-state.yaml

      - name: Verify generated schema is current
        run: |
          uv run --locked homelabctl schema --output config/schema/site.schema.json
          uv run --locked homelabctl manifest schema --output config/schema/future-state.schema.json
          git diff --exit-code -- config/schema/site.schema.json config/schema/future-state.schema.json

      - name: Check OpenTofu foundation and example plan
        run: |
          tofu -chdir=infrastructure fmt -check -recursive
          tofu -chdir=infrastructure init -backend=false -input=false -lockfile=readonly
          tofu -chdir=infrastructure validate
          tofu -chdir=infrastructure plan -refresh=false -lock=false -input=false -var-file=example.tfvars.json -out=example.tfplan

  installer-smoke:
    name: Ubuntu 24.04 installer smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install and verify on clean Ubuntu 24.04
        run: |
          git branch --force installer-smoke HEAD
          docker run --rm \
            --volume "${GITHUB_WORKSPACE}:/source:ro" \
            --env HOMELAB_REPOSITORY_URL=file:///tmp/installer-source \
            --env HOMELAB_BRANCH=installer-smoke \
            --env HOMELAB_INSTALL_DIR=/tmp/Homelab2 \
            ubuntu:24.04 \
            bash /source/.github/scripts/installer-smoke.sh
