---
- name: Apply the Homelab Debian-family baseline
  hosts: all
  gather_facts: true
  serial: 1
  tasks:
    - name: Require a supported Debian-family guest
      ansible.builtin.assert:
        that: ansible_facts.os_family == "Debian"
        fail_msg: "Only Debian and Ubuntu guests are supported by this baseline"

    - name: Set the configured hostname
      ansible.builtin.hostname:
        name: "{{ homelab_hostname }}"

    - name: Set the configured timezone
      community.general.timezone:
        name: "{{ homelab_timezone }}"

    - name: Set safe Debian package time limits
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/90-homelab-timeouts
        content: |
          Acquire::Retries "1";
          Acquire::http::Timeout "30";
          Acquire::https::Timeout "30";
          Acquire::ftp::Timeout "30";
          DPkg::Lock::Timeout "60";
        owner: root
        group: root
        mode: "0644"

    - name: Refresh package cache (up to 90 seconds)
      ansible.builtin.command:
        argv:
          - timeout
          - --foreground
          - 90s
          - apt-get
          - update
      environment:
        DEBIAN_FRONTEND: noninteractive
      changed_when: false
      check_mode: false
      when: not ansible_check_mode

    - name: Install baseline packages with bounded package access
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - sudo
        state: present
        update_cache: false
        lock_timeout: 60
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Create the dedicated automation account
      ansible.builtin.user:
        name: "{{ homelab_automation_user }}"
        create_home: true
        shell: /bin/bash
        groups: sudo
        append: true

    - name: Inspect the automation account home
      ansible.builtin.stat:
        path: "/home/{{ homelab_automation_user }}"
      register: automation_home

    - name: Install the dedicated automation public key
      ansible.posix.authorized_key:
        user: "{{ homelab_automation_user }}"
        key: "{{ lookup('file', hostvars[inventory_hostname].ansible_ssh_private_key_file + '.pub') }}"
        state: present
      when: not ansible_check_mode or automation_home.stat.exists

    - name: Grant explicit passwordless sudo to the automation account
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/90-homelab-{{ homelab_automation_user }}"
        content: "{{ homelab_automation_user }} ALL=(ALL:ALL) NOPASSWD: ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s

    - name: Record baseline ownership
      ansible.builtin.copy:
        dest: /etc/homelab-managed
        content: "managed-by=homelabctl\n"
        owner: root
        group: root
        mode: "0644"
