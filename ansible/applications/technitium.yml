---
- name: Configure the Community Scripts Technitium DNS replacement
  hosts: all
  gather_facts: true
  vars:
    technitium_admin_password: "{{ lookup('ansible.builtin.env', 'HOMELAB_TECHNITIUM_ADMIN_PASSWORD') }}"
  tasks:
    - name: Require the approved helper-installed DNS platform
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "Debian"
          - technitium_web_port == 5380
          - technitium_domain | length > 3
          - technitium_recursion_acl | length > 0
          - technitium_records | length > 0

    - name: Require the encrypted DNS administrator credential
      ansible.builtin.assert:
        that: technitium_admin_password | length >= 12
        fail_msg: The encrypted technitium-admin credential is required
      no_log: true

    - name: Verify the Community Scripts service exists
      ansible.builtin.stat:
        path: /etc/systemd/system/technitium.service
      register: technitium_service

    - name: Refuse to replace a non-helper installation
      ansible.builtin.assert:
        that: technitium_service.stat.isreg | default(false)
        fail_msg: Provision dns-core01 with the pinned Community Scripts workflow first

    - name: Ensure DNS validation and firewall packages are installed
      ansible.builtin.apt:
        name: [dnsutils, nftables]
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Install the DNS host firewall
      ansible.builtin.copy:
        dest: /etc/nftables.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          flush ruleset
          table inet homelab_dns {
            chain input {
              type filter hook input priority 0; policy drop;
              iifname "lo" accept
              ct state established,related accept
              ip protocol icmp accept
              ip saddr 192.168.20.0/24 tcp dport { 22, 5380 } accept
              ip saddr { {{ technitium_recursion_acl | join(', ') }} } udp dport 53 accept
              ip saddr { {{ technitium_recursion_acl | join(', ') }} } tcp dport 53 accept
            }
            chain forward { type filter hook forward priority 0; policy drop; }
            chain output { type filter hook output priority 0; policy accept; }
          }
      register: nftables_config
      when: not ansible_check_mode

    - name: Validate the DNS host firewall
      ansible.builtin.command: nft --check --file /etc/nftables.conf
      changed_when: false
      when: not ansible_check_mode

    - name: Enable the DNS host firewall
      ansible.builtin.systemd_service:
        name: nftables
        enabled: true
        state: restarted
      when:
        - not ansible_check_mode
        - nftables_config.changed

    - name: Wait for the local Technitium API
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/status"
        status_code: 200
      register: api_status
      retries: 20
      delay: 3
      until: api_status.json.status | default('error') == 'ok'
      when: not ansible_check_mode

    - name: Test the desired administrator credential
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body: {user: admin, pass: "{{ technitium_admin_password }}", includeInfo: "true"}
        status_code: 200
      register: desired_login
      no_log: true
      when: not ansible_check_mode
      failed_when: false

    - name: Authenticate with the one-time default credential
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body: {user: admin, pass: admin, includeInfo: "true"}
        status_code: 200
      register: default_login
      no_log: true
      when:
        - not ansible_check_mode
        - desired_login.json.status | default('error') != 'ok'

    - name: Replace the one-time default password
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/user/changePassword"
        method: POST
        headers: {Authorization: "Bearer {{ default_login.json.token }}"}
        body_format: form-urlencoded
        body: {pass: admin, newPass: "{{ technitium_admin_password }}"}
        status_code: 200
      no_log: true
      when:
        - not ansible_check_mode
        - desired_login.json.status | default('error') != 'ok'

    - name: Authenticate for desired-state configuration
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body: {user: admin, pass: "{{ technitium_admin_password }}", includeInfo: "true"}
        status_code: 200
      register: login
      failed_when: login.json.status | default('error') != 'ok'
      no_log: true
      when: not ansible_check_mode

    - name: Configure secure recursive DNS policy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/settings/set"
        method: POST
        headers: {Authorization: "Bearer {{ login.json.token }}"}
        body_format: form-urlencoded
        body:
          dnsServerDomain: "dns-core01.{{ technitium_domain }}"
          dnsServerLocalEndPoints: "0.0.0.0:53"
          recursion: UseSpecifiedNetworkACL
          recursionNetworkACL: "{{ technitium_recursion_acl | join(',') }}"
          dnssecValidation: "true"
          qnameMinimization: "true"
          locallyServedDnsZones: "true"
          serveStale: "true"
          enableBlocking: "false"
          forwarders: "cloudflare-dns.com (1.1.1.1),cloudflare-dns.com (1.0.0.1)"
          forwarderProtocol: Tls
          concurrentForwarding: "true"
          enableLogging: "true"
          logQueries: "false"
          maxLogFileDays: "30"
        status_code: 200
      no_log: true
      when: not ansible_check_mode

    - name: List authoritative zones
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/zones/list"
        headers: {Authorization: "Bearer {{ login.json.token }}"}
        status_code: 200
      register: zones
      no_log: true
      when: not ansible_check_mode

    - name: Create the internal forward zone
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/zones/create"
        method: POST
        headers: {Authorization: "Bearer {{ login.json.token }}"}
        body_format: form-urlencoded
        body: {zone: "{{ technitium_domain }}", type: Primary, useSoaSerialDateScheme: "true"}
        status_code: 200
      no_log: true
      when:
        - not ansible_check_mode
        - technitium_domain not in (zones.json.response.zones | map(attribute='name') | list)

    - name: Reconcile internal A and PTR records
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ technitium_web_port }}/api/zones/records/add"
        method: POST
        headers: {Authorization: "Bearer {{ login.json.token }}"}
        body_format: form-urlencoded
        body:
          domain: "{{ item.name }}.{{ technitium_domain }}"
          zone: "{{ technitium_domain }}"
          type: A
          ttl: "300"
          overwrite: "true"
          ipAddress: "{{ item.address }}"
          ptr: "true"
          createPtrZone: "true"
          comments: Managed by Homelab2
        status_code: 200
      loop: "{{ technitium_records }}"
      no_log: true
      when: not ansible_check_mode

    - name: Verify internal DNS over UDP
      ansible.builtin.command: "dig +time=5 +tries=1 @127.0.0.1 dns-core01.{{ technitium_domain }} A"
      changed_when: false
      when: not ansible_check_mode

    - name: Verify recursive DNS over TCP
      ansible.builtin.command: dig +tcp +time=5 +tries=1 @127.0.0.1 cloudflare.com A
      changed_when: false
      when: not ansible_check_mode
